name: CD - Deploy to GCP GKE

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  deploy-gke:
    runs-on: ubuntu-latest # You can use standard runners or your prod-eks-runners
    permissions:
      id-token: write
      contents: read

    env:
      # Copy your GCP-specific envs here
      GCP_PROJECT_ID: platform-test-487912
      GKE_CLUSTER: lcnc-cluster-delhi
      GKE_REGION: asia-south2
      NAMESPACE: apps-release
      # Use the same image EKS uses to avoid rebuilding
      IMAGE_TAG: 216084506783.dkr.ecr.ap-south-1.amazonaws.com/backstract_apps:boring-stallman-a853a87033

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: "projects/208126041268/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
        service_account: "github-deployer@platform-test-487912.iam.gserviceaccount.com"

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_REGION }}

    - name: Deploy to GKE
      uses: ./.github/actions/log-streamer
      env:
        BST_TOKEN: ${{ secrets.BACKSTRACT_AUTH_TOKEN }}
      with:
        step_name: "GKE Deployment"
        command: |
          kubectl get ns $NAMESPACE || kubectl create ns $NAMESPACE
          
          # FIX: Re-sync the AWS ECR Secret every time to ensure the token is fresh
          kubectl create secret docker-registry aws-ecr-creds \
            --docker-server=${{ steps.login-ecr.outputs.registry }} \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password --region ${{ env.AWS_REGION }}) \
            --namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          # Inject Token and Strip EKS-specific lines
          awk -v token="${BST_TOKEN}" '{gsub(/PLACEHOLDER_BST_TOKEN_REPLACE_AT_RUNTIME/, token)}1' "infra/k8s/deployment.yaml" | sed '/tolerations:/,$d' > /tmp/gke_deployment.yaml
          
          # Apply
          kubectl apply -n $NAMESPACE -f /tmp/gke_deployment.yaml
          kubectl apply -n $NAMESPACE -f "infra/k8s/service.yaml"
          
          # DEBUG: If it takes more than 30s, print the pod error
          echo "Waiting for rollout... If stuck, checking pod events:"
          sleep 20
          kubectl get pods -n $NAMESPACE
          kubectl describe pods -l app=boring-stallman-a853a87033 -n $NAMESPACE
          
          # Final Status Check
          kubectl rollout status deployment "boring-stallman-a853a87033-depl" -n $NAMESPACE --timeout=120s
