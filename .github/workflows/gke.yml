name: CD - GitOps Deploy via Argo CD

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  deploy-gitops:
    runs-on: ubuntu-latest

    env:
      # GCP CONFIG
      GCP_PROJECT_ID: platform-test-487912
      GKE_CLUSTER: lcnc-cluster-delhi
      GKE_REGION: asia-south2
      NAMESPACE: apps-release
      GCP_WIF_PROVIDER: "projects/208126041268/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
      GCP_WIF_SA: "github-deployer@platform-test-487912.iam.gserviceaccount.com"

      # AWS CONFIG (To pull images from ECR)
      AWS_REGION: ap-south-1
      ECR_REGISTRY: 216084506783.dkr.ecr.ap-south-1.amazonaws.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::216084506783:role/GitHubActionsDeployRole
        aws-region: ${{ env.AWS_REGION }}

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
        service_account: ${{ env.GCP_WIF_SA }}

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_REGION }}

    # 1. Dynamically provision Runtime Secrets & ECR Credentials into GKE
    - name: Provision Secrets & ECR Credentials in GKE
      run: |
        # Ensure target namespace exists
        kubectl get ns ${{ env.NAMESPACE }} || kubectl create ns ${{ env.NAMESPACE }}

        # Create/Update AWS ECR docker-registry pull secret
        ECR_PASS=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
        kubectl create secret docker-registry aws-ecr-creds \
          --docker-server=${{ env.ECR_REGISTRY }} \
          --docker-username=AWS \
          --docker-password=$ECR_PASS \
          --namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

        # Create/Update App Environment Secrets directly in GKE
        echo "${{ secrets.K8S_ENV_FILE }}" > .env
        kubectl create secret generic app-secrets-coll-c766e74b4a974272b188e43d174331e7 \
          --namespace ${{ env.NAMESPACE }} --from-env-file=.env --dry-run=client -o yaml | kubectl apply -f -

    # 2. Sanitize deployment manifest for GKE Autopilot
    - name: Sanitize Manifests for GKE
      env:
        BST_TOKEN: ${{ secrets.BACKSTRACT_AUTH_TOKEN }}
      run: |
        # Inject Backstract token placeholder if present
        if [ -f "infra/k8s/deployment.yaml" ]; then
          awk -v token="${BST_TOKEN}" '{gsub(/PLACEHOLDER_BST_TOKEN_REPLACE_AT_RUNTIME/, token)}1' "infra/k8s/deployment.yaml" > /tmp/clean_deployment.yaml
        elif [ -f "infra/k8s/gke/deployment.yaml" ]; then
          awk -v token="${BST_TOKEN}" '{gsub(/PLACEHOLDER_BST_TOKEN_REPLACE_AT_RUNTIME/, token)}1' "infra/k8s/gke/deployment.yaml" > /tmp/clean_deployment.yaml
        fi

        # Strip EKS-specific tolerations and affinity
        sed -i '/tolerations:/,+3d' /tmp/clean_deployment.yaml
        sed -i '/affinity:/,+8d' /tmp/clean_deployment.yaml

        # Save clean manifest in infra/k8s/gke/
        mkdir -p infra/k8s/gke
        mv /tmp/clean_deployment.yaml infra/k8s/gke/deployment.yaml

    # 3. Commit clean manifests back to Git for Argo CD
    - name: Commit Sanitized Manifests
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git add infra/k8s/gke/deployment.yaml
        if ! git diff-index --quiet HEAD; then
          git commit -m "chore(gitops): sanitize deployment for GKE Autopilot [skip ci]"

          # Pull latest remote changes first to prevent push rejection
          git pull --rebase origin master

          git push origin master
        else
          echo "No manifest changes to commit."
        fi

    # 4. Notify Argo CD to sync immediately
    - name: Trigger Argo CD Webhook Sync
      run: |
        curl -X POST -k https://argocd.backstract.io/api/webhook \
          -H "Content-Type: application/json" \
          -H "X-GitHub-Event: push" \
          -d '{"ref": "refs/heads/master"}'
